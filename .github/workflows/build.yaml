name: Build

on:
  workflow_call:
    inputs:
      mode:
        required: true
        type: string
        default: snapshot
        description: |
          the mode to use. either `snapshot` or `release`. Will affect effective version, as well
          as target-oci-registry.
    secrets:
      dockerhub-auth-token:
        required: false
        description: |
          Docker Hub read token used by the OCI build workflow for pull authentication.

permissions: {}

jobs:
  prepare:
    uses: gardener/cc-utils/.github/workflows/prepare.yaml@v1 # zizmor: ignore[unpinned-uses] -- same-org reusable workflow; intentionally allowed for now, planned to pin to a version in the future
    with:
      mode: ${{ inputs.mode }}
      version-commit-callback-action-path: .github/actions/prepare-release
      checkout-fetch-depth: 0
    permissions:
      id-token: write

  oci-images:
    name: Build OCI-Images
    needs:
      - prepare
    permissions:
      contents: read
      packages: write
      id-token: write
    secrets:
      dockerhub-auth-token: ${{ secrets.dockerhub-auth-token }}
    uses: gardener/cc-utils/.github/workflows/oci-ocm.yaml@v1 # zizmor: ignore[unpinned-uses] -- same-org reusable workflow; intentionally allowed for now, planned to pin to a version in the future
    strategy:
      matrix:
        args:
          - name: gardener-dashboard
            target: dashboard
            # special-handling: push to different repository for `openmfp`-branch
            # head_ref = source branch (PRs), ref_name = push target (direct pushes)
            oci-repository: gardener/dashboard${{ (github.head_ref || github.ref_name) == 'openmfp' && '-openmfp' || '' }}
            oci-registry: ${{ (github.head_ref || github.ref_name) == 'openmfp' && 'europe-docker.pkg.dev/gardener-project/releases' || '' }}
            ocm-labels:
              name: gardener.cloud/cve-categorisation
              value:
                network_exposure: public
                authentication_enforced: false
                user_interaction: end-user
                confidentiality_requirement: high
                integrity_requirement: high
                availability_requirement: low
    with:
      name: ${{ matrix.args.name }}
      version: ${{ needs.prepare.outputs.version }}
      target: ${{ matrix.args.target }}
      oci-registry: ${{ matrix.args.oci-registry || needs.prepare.outputs.oci-registry }}
      oci-repository: ${{ matrix.args.oci-repository }}
      oci-platforms: linux/amd64,linux/arm64
      ocm-labels: ${{ toJSON(matrix.args.ocm-labels) }}
      extra-tags: latest

  oci-images-summary:
    name: OCI Images Summary
    runs-on: ubuntu-latest
    needs: oci-images
    if: ${{ always() }}  # Ensures this job runs even if the matrix partially fails
    permissions:
      contents: read
    steps:
      - name: Fail if OCI matrix failed
        if: ${{ needs.oci-images.result != 'success' }}
        run: exit 1

  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.16.0'
      - uses: gardener/cc-utils/.github/actions/trusted-checkout@v1 # zizmor: ignore[unpinned-uses] -- same-org action; intentionally allowed for now, planned to pin to a version in the future
      - name: run-verify
        shell: bash
        run: |
          set -eu
          mkdir /tmp/blobs.d
          .ci/verify |& tee /tmp/blobs.d/verify-log.txt
          tar czf /tmp/blobs.d/verify-log.tar.gz -C/tmp/blobs.d verify-log.txt
      - name: add-verify-results-to-component-descriptor
        uses: gardener/cc-utils/.github/actions/export-ocm-fragments@v1 # zizmor: ignore[unpinned-uses] -- same-org action; intentionally allowed for now, planned to pin to a version in the future
        with:
          blobs-directory: /tmp/blobs.d
          ocm-resources: |
            - name: test-results
              relation: local
              access:
                type: localBlob
                localReference: verify-log.tar.gz
              labels:
                - name: gardener.cloud/purposes
                  value:
                    - test
  sast-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.16.0'
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: run-eslint
        run: |
          set -eu
          YARN_ENABLE_SCRIPTS=0 YARN_ENABLE_HARDENED_MODE=1 yarn install --immutable --check-cache --refresh-lockfile
          (
            cd frontend
            yarn lint --format=@microsoft/eslint-formatter-sarif -o ../dashboard-frontend.sarif
          )
          (
            cd backend
            yarn lint --format=@microsoft/eslint-formatter-sarif -o ../dashboard-backend.sarif
          )

          mkdir /tmp/blobs.d
          tar czf /tmp/blobs.d/eslint-report.tar.gz \
            dashboard-frontend.sarif \
            dashboard-backend.sarif
      - name: add-sast-report-to-component-descriptor
        uses: gardener/cc-utils/.github/actions/export-ocm-fragments@v1 # zizmor: ignore[unpinned-uses] -- same-org action; intentionally allowed for now, planned to pin to a version in the future
        with:
          blobs-directory: /tmp/blobs.d
          ocm-resources: |
            name: eslint-report
            relation: local
            access:
              type: localBlob
              localReference: eslint-report.tar.gz
            labels:
              - name: gardener.cloud/purposes
                value:
                  - lint
                  - sast
                  - eslint
              - name: gardener.cloud/comment
                value: |
                  we use eslint-plugin-security (linter) for SAST scans
                  see: https://github.com/eslint-community/eslint-plugin-security
                  enabled by: https://github.com/gardener/dashboard/pull/2029
