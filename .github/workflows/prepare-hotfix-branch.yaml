name: Prepare Hotfix Branch

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
      callback-action-path:
        required: false
        type: string
        default: ''
  workflow_dispatch:
    inputs:
      tag:
        description: 'The tag for which the hotfix should be created'
        required: true
        type: string
      callback-action-path:
        description: 'Callback action path'
        required: false
        type: string
        default: .github/actions/prepare-hotfix

permissions:
  id-token: write # required for GitHub OIDC Federation Service token

jobs:
  prepare-hotfix:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ inputs.tag }}
    steps:
      - name: Create GitHub App token
        uses: gardener/cc-utils/.github/actions/github-auth@master
        id: app-token
        with:
          token-server: ${{ vars.FEDERATED_GITHUB_ACCESS_TOKEN_SERVER }}
          repositories: ${{ github.event.repository.name }}
          permissions: |
            contents: write
            pull-requests: write
            workflows: write

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 1

      - name: Prepare hotfix branch
        uses: gardener/dashboard/.github/actions/prepare-hotfix-branch@master
        with:
          tag: ${{ env.TAG }}
          github-token: ${{ steps.app-token.outputs.token }}
          callback-action-path: ${{ inputs.callback-action-path }}
