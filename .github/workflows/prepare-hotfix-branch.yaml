name: Prepare Hotfix Branch

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
      callback-action-path:
        required: false
        type: string
        default: ''
  workflow_dispatch:
    inputs:
      tag:
        description: 'The tag for which the hotfix should be created'
        required: true
        type: string
      callback-action-path:
        description: 'Callback action path'
        required: false
        type: string
        default: .github/actions/prepare-hotfix

permissions: {}

jobs:
  prepare-hotfix:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      TAG: ${{ inputs.tag }}
    steps:
      - name: Create GitHub App token
        uses: gardener/cc-utils/.github/actions/github-auth@v1 # zizmor: ignore[unpinned-uses] -- same-org action; intentionally allowed for now, planned to pin to a version in the future
        id: app-token
        with:
          token-server: ${{ vars.FEDERATED_GITHUB_ACCESS_TOKEN_SERVER }}
          repositories: ${{ github.event.repository.name }}
          permissions: |
            contents: write
            pull-requests: write
            workflows: write

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 1
          persist-credentials: false

      - name: Prepare hotfix branch
        uses: gardener/dashboard/.github/actions/prepare-hotfix-branch@master # zizmor: ignore[unpinned-uses] -- same-repo action; intentionally tracks master as the trusted source for the latest hotfix preparation logic
        with:
          tag: ${{ env.TAG }}
          github-token: ${{ steps.app-token.outputs.token }}
          callback-action-path: ${{ inputs.callback-action-path }}
